<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Story Theater</title>

  <!-- LINK TO CSS FILE -->
  <link rel="stylesheet" href="story.css">
</head>

<body>

  <!-- 🌍 MAIN WORLD CONTAINER -->
  <div class="world">

    <!-- 📖 LEFT SIDE: STORY PAGE -->
    <div class="story-page">

      <div class="panel story-panel">
        <h1>Chapter One</h1>
        <p>
          The golden world awakens as the ink of destiny begins to flow across the parchment sky...
        </p>
      </div>

    </div>

    <!-- 💬 RIGHT SIDE: HALL (CHAT SPACE) -->
    <div class="hall-page">

      <div class="panel hall-panel">
        <h2>The Hall</h2>

        <div class="chat-box">
          <div class="chat-bubble">Welcome to the Hall...</div>
          <div class="chat-bubble">The story is alive here.</div>
        </div>

      </div>

    </div>

  </div>

</body>
</html>
