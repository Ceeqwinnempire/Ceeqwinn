<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ceeqwinn Immersive Story</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #d4a373;
  --deep-gold: #8c5a2b;
  --bg1: #f6c28b;
  --bg2: #ebaE73;
  --bg3: #d18a5c;
  --text: #2b2b2b;

  --romance: 0.2;
  --fantasy: 0.3;
  --drama: 0.2;
  --horror: 0.1;
  --chaos: 0.2;
}

* { box-sizing: border-box; margin:0; padding:0; }

body {
  font-family: 'Lato', sans-serif;
  overflow-x: hidden;

  background: linear-gradient(
    #f6c28b,
    #ebaE73,
    #d18a5c
  );
}

.stage {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;

  background:
    radial-gradient(circle at center, rgba(255,220,160,0.4), transparent 60%),
    linear-gradient(var(--bg1), var(--bg2), var(--bg3));

  transition: background 0.4s ease;
}

.particle {
  position: fixed;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  opacity: 0.5;
  animation: float linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* ===== CURTAINS ===== */
.curtain {
  position: fixed;
  top: 0;
  height: 100%;
  width: clamp(18px, 6vw, 80px);
  z-index: 2;
  overflow: hidden;

  /* GOLD (TOP) → RED (BOTTOM) HYBRID CURTAIN */
  background: linear-gradient(
    180deg,
    #f5e6cc 0%,
    #d4a373 35%,
    #8c5a2b 70%,
    #7b1b2a 100%
  );

  box-shadow: inset 0 0 40px rgba(0,0,0,0.25);
}

.curtain.left { left: 0; }
.curtain.right { right: 0; }

.curtain::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.35) 0 2px, transparent 3px),
    radial-gradient(circle at 70% 60%, rgba(255,215,160,0.25) 0 2px, transparent 3px),
    radial-gradient(circle at 40% 80%, rgba(255,255,255,0.2) 0 2px, transparent 3px);
  opacity: 0.6;
  animation: curtainSparkle 6s infinite ease-in-out;
}

@keyframes curtainSparkle {
  0%, 100% { transform: translateY(0); opacity: 0.5; }
  50% { transform: translateY(-6px); opacity: 0.85; }
}

.curtain.left { left: 0; }
.curtain.right { right: 0; }

.main {
  position: relative;
  z-index: 3;
  max-width: 720px;
  margin: auto;
  padding-left: clamp(16px, 6vw, 90px);
  padding-right: clamp(16px, 6vw, 90px);
  padding-top: 16px;
}



.header {
  text-align: center;
  font-family: 'Cinzel', serif;
  margin-bottom: 10px;
}

.nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 10px;
}

.crystal {
  position: fixed;
  right: 10px;
  top: 20%;
  width: 6px;
  height: 60%;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  overflow: hidden;
}

.crystal-fill {
  width: 100%;
  height: 0%;
  background: linear-gradient(#fff, var(--gold));
  transition: height 0.2s ease;
}

.hall {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  height: 60%;
  background: rgba(245,230,204,0.95);
  border-radius: 20px 20px 0 0;
  padding: 15px;
  transition: transform 0.4s ease;
  transform: translateY(100%);
}

.hall.open {
  transform: translateY(0);
}

.chat {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg {
  background: #fff;
  padding: 10px;
  border-radius: 10px;
  border-left: 4px solid var(--gold);
}

.dock {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(10px);
}

.dock button {
  background: none;
  border: none;
  color: white;
  font-size: 16px;
}

.particle {
  position: fixed;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  opacity: 0.5;
  animation: float linear infinite;
}
</style>

</head>

<body>

<div class="stage"></div>
<div class="curtain left"></div>
<div class="curtain right"></div>

<div class="main">
  <div class="header">Ceeqwinn Immersive Story</div>
  <div class="nav">🏠 🔔 ✉️ 🔍</div>
  <div class="panel" id="story">
    The sun hung low in the sky, casting a golden glow across the countryside...
  </div>
</div>

<div class="crystal">
  <div class="crystal-fill" id="crystalFill"></div>
</div>

<div class="hall" id="hall">
  <div class="chat">
    <div class="msg">They better grab cake!</div>
    <div class="msg">Dessert heist??</div>
  </div>
</div>

<div class="dock">
  <button onclick="toggleHall()">Hall</button>
  <button>Home</button>
  <button>Back</button>
  <button>Settings</button>
</div>

<script>
for (let i=0;i<25;i++){
  let p=document.createElement('div');
  p.className='particle';
  p.style.left=Math.random()*100+'%';
  p.style.animationDuration=(4+Math.random()*4)+'s';
  document.body.appendChild(p);
}

window.addEventListener('scroll', ()=>{
  let h = document.documentElement.scrollHeight - window.innerHeight;
  let sc = (window.scrollY / h) * 100;
  document.getElementById('crystalFill').style.height = sc + '%';
});

function toggleHall(){
  document.getElementById('hall').classList.toggle('open');
}

function updateAtmosphere(){
  let romance = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--romance'));
  let horror = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--horror'));

  let warm = 246 + romance*20 - horror*30;
  let mid = 200 + romance*10 - horror*20;
  let dark = 150 + romance*5 - horror*40;

  document.querySelector('.stage').style.background =
    `linear-gradient(rgb(${warm},180,140), rgb(${mid},140,100), rgb(${dark},100,80))`;
}

updateAtmosphere();
</script>

</body>
</html>
