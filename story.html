<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ceeqwinn Immersive Story Site</title>
  <link rel="stylesheet" href="styles.css"/>
</head>

<body>

<!-- 🌫️ BACKGROUND LAYER -->
<div class="bg"></div>
<div class="particles"></div>

<!-- 🎭 CURTAINS -->
<div class="curtain left"></div>
<div class="curtain right"></div>

<!-- 🧠 APP -->
<div class="app">

  <!-- 🧭 HEADER -->
  <header class="topbar">
    <div class="title">Ceeqwinn Immersive Story Site</div>

    <div class="icons">
      <span>🏠</span>
      <span>🔍</span>
      <span>👤</span>
      <span>⚙️</span>
    </div>
  </header>

  <!-- 📖 STORY SCENE -->
  <main class="scene story" id="storyScene">

    <article class="story-card">

      <h1>The Quiet Sunset</h1>

      <p>
        The sun hung low in the sky, casting a golden glow over the countryside...
      </p>

      <div class="meta">
        DiaryDoodles · 15m ago · Reply · See in Hall
      </div>

    </article>

  </main>

  <!-- 💬 HALL SCENE -->
  <main class="scene hall hidden" id="hallScene">

    <div class="chat">

      <div class="msg">
        <span class="user">DiaryDoodles</span>
        <p>They better grab some cake for me!</p>
      </div>

      <div class="msg">
        <span class="user">SillyScript</span>
        <p>Dessert heist? I’m in 😭</p>
      </div>

    </div>

  </main>

  <!-- ⌨️ INPUT -->
  <div class="inputBar">
    <input placeholder="Type a message..." />
    <button>➤</button>
  </div>

  <!-- 🔥 CTA -->
  <button class="cta">
    Join the Hall of Voices
  </button>

  <!-- 📱 NAV -->
  <nav class="bottomNav">
    <span>🏠</span>
    <span>⬅️</span>
    <span>⚙️</span>
    <span>●</span>
  </nav>

</div>

<script src="app.js"></script>
</body>
</html>
