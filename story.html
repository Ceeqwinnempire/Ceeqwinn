<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ceeqwinn Immersive Story</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #d4a373;
  --deep-gold: #8c5a2b;
  --bg1: #f6c28b;
  --bg2: #ebaE73;
  --bg3: #d18a5c;
  --text: #2b2b2b;
}

* { box-sizing: border-box; margin:0; padding:0; }

body {
  font-family: 'Lato', sans-serif;
  overflow-x: hidden;
  background: linear-gradient(#f6c28b, #ebaE73, #d18a5c);
}

/* ===== BACKGROUND ===== */
.stage {
  position: fixed;
  inset: 0;
  z-index: -2;
  pointer-events: none;
  background:
    radial-gradient(circle at center, rgba(255,220,160,0.4), transparent 60%),
    linear-gradient(var(--bg1), var(--bg2), var(--bg3));
}

/* ===== CURTAINS (FIXED REAL IMAGE LAYER) ===== */
.curtain {
  position: fixed;
  top: 0;
  height: 120vh;

  /* 🔥 FIXED RESPONSIVE SIZE */
  width: clamp(80px, 14vw, 180px);

  z-index: 2;
  pointer-events: none;

  background-image: url("https://i.postimg.cc/D0Dstsmc/Ethereal-fantasy-curtains-made-2.png");
  background-size: cover;
  background-repeat: no-repeat;
  background-position: center;

  /* 🔥 fade bottom so it doesn't block reading */
  -webkit-mask-image: linear-gradient(
    to bottom,
    black 0%,
    black 75%,
    transparent 100%
  );
  mask-image: linear-gradient(
    to bottom,
    black 0%,
    black 75%,
    transparent 100%
  );

  filter: drop-shadow(0 10px 20px rgba(0,0,0,0.25));
}

/* LEFT SIDE */
.curtain.left {
  left: 0;
  background-position: left center;
}

/* RIGHT SIDE */
.curtain.right {
  right: 0;
  background-position: right center;
}

/* ===== MAIN CONTENT ===== */
.main {
  position: relative;
  z-index: 3;

  max-width: 720px;
  margin: auto;

  /* keeps content SAFE from curtains */
  padding-left: clamp(100px, 16vw, 220px);
  padding-right: clamp(100px, 16vw, 220px);

  padding-top: 16px;
}

.panel {
  backdrop-filter: blur(10px);
  background: rgba(245,230,204,0.92);
  border-radius: 18px;
  padding: 20px;
  color: var(--text);
  line-height: 1.7;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

.header {
  text-align: center;
  font-family: 'Cinzel', serif;
  margin-bottom: 10px;
}

.nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 10px;
}

/* ===== PARTICLES ===== */
.particle {
  position: fixed;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  opacity: 0.5;
  animation: float linear infinite;
  z-index: 0;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<div class="stage"></div>

<div class="curtain left"></div>
<div class="curtain right"></div>

<div class="main">
  <div class="header">Ceeqwinn Immersive Story</div>
  <div class="nav">🏠 🔔 ✉️ 🔍</div>

  <div class="panel">
    The sun hung low in the sky, casting a golden glow across the countryside...
  </div>
</div>

<script>
for (let i = 0; i < 25; i++) {
  let p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDuration = (4 + Math.random() * 4) + 's';
  document.body.appendChild(p);
}
</script>

</body>
</html>
