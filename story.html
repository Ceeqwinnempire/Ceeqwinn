<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ceeqwinn Immersive Story</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #d4a373;
  --deep-gold: #8c5a2b;
  --bg1: #f6c28b;
  --bg2: #ebaE73;
  --bg3: #d18a5c;
  --text: #2b2b2b;

  /* Genre weights */
  --romance: 0.2;
  --fantasy: 0.3;
  --drama: 0.2;
  --horror: 0.1;
  --chaos: 0.2;
}

* { box-sizing: border-box; margin:0; padding:0; }

body {
  font-family: 'Lato', sans-serif;
  overflow-x: hidden;
}

/* ===== ROOT STAGE ===== */
.stage {
  position: fixed;
  inset: 0;
  background: linear-gradient(var(--bg1), var(--bg2), var(--bg3));
  z-index: -2;
  transition: background 0.4s ease;
}

/* PARTICLES */
.particle {
  position: fixed;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  opacity: 0.5;
  animation: float linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* ===== CURTAINS ===== */
.curtain {
  position: fixed;
  top: 0;
  height: 100%;

  width: clamp(18px, 6vw, 80px);

  background: linear-gradient(#8c5a2b, #d4a373);
  z-index: 2;
}
/* ===== READING COLUMN ===== */
.main {
  position: relative;
  z-index: 3;
  max-width: 720px;
  margin: auto;
  padding: 16px;
}

.panel {
  backdrop-filter: blur(10px);
  background: rgba(245,230,204,0.9);
  border-radius: 18px;
  padding: 20px;
  color: var(--text);
  line-height: 1.7;
}

.header {
  text-align: center;
  font-family: 'Cinzel', serif;
  margin-bottom: 10px;
}

.nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 10px;
}

/* ===== CRYSTAL SCROLL ===== */
.crystal {
  position: fixed;
  right: 10px;
  top: 20%;
  width: 6px;
  height: 60%;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  overflow: hidden;
}

.crystal-fill {
  width: 100%;
  height: 0%;
  background: linear-gradient(#fff, var(--gold));
  transition: height 0.2s ease;
}

/* ===== CHAT PANEL ===== */
.hall {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  height: 60%;
  background: rgba(245,230,204,0.95);
  border-radius: 20px 20px 0 0;
  padding: 15px;
  transition: transform 0.4s ease;
  transform: translateY(100%);
}

.hall.open {
  transform: translateY(0);
}

.chat {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg {
  background: #fff;
  padding: 10px;
  border-radius: 10px;
  border-left: 4px solid var(--gold);
}

/* ===== BOTTOM DOCK ===== */
.dock {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(10px);
}

.dock button {
  background: none;
  border: none;
  color: white;
  font-size: 16px;
}

</style>
</head>

<body>

<div class="stage"></div>

<div class="curtain left"></div>
<div class="curtain right"></div>

<div class="main">
  <div class="header">Ceeqwinn Immersive Story</div>

  <div class="nav">🏠 🔔 ✉️ 🔍</div>

  <div class="panel" id="story">
    The sun hung low in the sky, casting a golden glow across the countryside...
  </div>
</div>

<div class="crystal">
  <div class="crystal-fill" id="crystalFill"></div>
</div>

<div class="hall" id="hall">
  <div class="chat">
    <div class="msg">They better grab cake!</div>
    <div class="msg">Dessert heist??</div>
  </div>
</div>

<div class="dock">
  <button onclick="toggleHall()">Hall</button>
  <button>Home</button>
  <button>Back</button>
  <button>Settings</button>
</div>

<script>

/* PARTICLES */
for (let i=0;i<25;i++){
  let p=document.createElement('div');
  p.className='particle';
  p.style.left=Math.random()*100+'%';
  p.style.animationDuration=(4+Math.random()*4)+'s';
  document.body.appendChild(p);
}

/* SCROLL CRYSTAL */
window.addEventListener('scroll', ()=>{
  let h = document.documentElement.scrollHeight - window.innerHeight;
  let sc = (window.scrollY / h) * 100;
  document.getElementById('crystalFill').style.height = sc + '%';
});

/* HALL */
function toggleHall(){
  document.getElementById('hall').classList.toggle('open');
}

/* GENRE ENGINE */
function updateAtmosphere(){
  let romance = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--romance'));
  let horror = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--horror'));

  let warm = 246 + romance*20 - horror*30;
  let mid = 200 + romance*10 - horror*20;
  let dark = 150 + romance*5 - horror*40;

  document.querySelector('.stage').style.background =
    `linear-gradient(rgb(${warm},180,140), rgb(${mid},140,100), rgb(${dark},100,80))`;
}

updateAtmosphere();

</script>

</body>
</html>
